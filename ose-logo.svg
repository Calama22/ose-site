<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120" role="img" aria-label="OSE">
  <defs>
    <!-- Chrome métal liquide : ciel clair en haut, ligne d'horizon sombre, reflet sol clair -->
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#f3f8ff"/>
      <stop offset="0.30" stop-color="#aacaf2"/>
      <stop offset="0.49" stop-color="#5d83c2"/>
      <stop offset="0.50" stop-color="#23386b"/>
      <stop offset="0.52" stop-color="#3a5fa0"/>
      <stop offset="0.70" stop-color="#bcd6ff"/>
      <stop offset="1"    stop-color="#eaf3ff"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <g font-family="Arial, 'Helvetica Neue', sans-serif" font-size="86" font-weight="900" font-style="italic" letter-spacing="-3">
    <text x="28" y="84" fill="#16264d" stroke="#16264d" stroke-width="3" stroke-linejoin="round">OSE</text>
    <text x="28" y="84" fill="url(#chrome)">OSE</text>
    <text x="28" y="84" fill="url(#shine)" clip-path="inset(0 0 60% 0)">OSE</text>
  </g>
</svg>
